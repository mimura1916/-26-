<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>26会の皆さん、パーソリュ課へようこそ！</title>
  <style>
    :root {
      --bg-main: #fff4e8;
      --bg-sub: #ffe6cc;
      --bg-accent: #ffd4a8;
      --card: rgba(255, 255, 255, 0.72);
      --card-border: rgba(255, 172, 109, 0.28);
      --text: #5a3b25;
      --muted: #8e6a4e;
      --accent1: #ffb36b;
      --accent2: #ff8fb1;
      --accent3: #8fd8ff;
      --accent4: #c5a2ff;
      --shadow: 0 20px 40px rgba(210, 128, 52, 0.14);
      --modal-shadow: 0 30px 60px rgba(124, 76, 35, 0.2);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.75), transparent 22%),
        radial-gradient(circle at 90% 12%, rgba(255, 214, 170, 0.7), transparent 24%),
        radial-gradient(circle at 15% 85%, rgba(255, 200, 210, 0.35), transparent 20%),
        linear-gradient(135deg, var(--bg-main), var(--bg-sub) 55%, var(--bg-accent));
      min-height: 100vh;
      line-height: 1.7;
      overflow-x: hidden;
    }

    .party-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .party-bg .confetti,
    .party-bg .dot,
    .party-bg .star,
    .party-bg .balloon,
    .party-bg .streamer {
      position: absolute;
      opacity: 0.9;
    }

    .party-bg .confetti {
      width: 14px;
      height: 32px;
      border-radius: 999px;
      transform: rotate(18deg);
      filter: blur(0.2px);
    }

    .party-bg .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .party-bg .star {
      font-size: 18px;
      color: rgba(255, 154, 111, 0.8);
    }

    .party-bg .streamer {
      width: 120px;
      height: 40px;
      border: 5px solid transparent;
      border-top-color: rgba(255, 150, 98, 0.55);
      border-radius: 50%;
      transform: rotate(-20deg);
    }

    .party-bg .balloon {
      width: 54px;
      height: 68px;
      border-radius: 50% 50% 46% 46%;
      box-shadow: inset -8px -10px 0 rgba(255,255,255,0.12);
    }

    .party-bg .balloon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 62px;
      width: 1.5px;
      height: 58px;
      background: rgba(146, 109, 78, 0.35);
    }

    .party-bg .balloon::before {
      content: "";
      position: absolute;
      left: calc(50% - 4px);
      bottom: -5px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 8px solid currentColor;
      filter: brightness(0.95);
    }

    .container {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header { padding: 52px 0 24px; }

    .hero {
      position: relative;
      background: linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,255,255,0.48));
      border: 1px solid rgba(255, 182, 116, 0.35);
      border-radius: 30px;
      padding: 34px 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .hero::before {
      width: 220px;
      height: 220px;
      right: -70px;
      top: -60px;
      background: radial-gradient(circle, rgba(255, 180, 108, 0.28), transparent 68%);
    }

    .hero::after {
      width: 180px;
      height: 180px;
      left: -50px;
      bottom: -60px;
      background: radial-gradient(circle, rgba(255, 143, 177, 0.22), transparent 68%);
    }

    .eyebrow {
      display: inline-block;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.08em;
      background: rgba(255, 179, 107, 0.2);
      border: 1px solid rgba(255, 169, 99, 0.35);
      color: #b8622a;
      margin-bottom: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.25;
      color: #7a4a25;
    }

    .lead {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 15px;
    }

    main { padding: 14px 0 64px; }

    .guide {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 18px;
      color: #9a6a45;
      font-size: 14px;
      font-weight: 600;
    }

    .guide .icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(255, 171, 99, 0.25);
      box-shadow: 0 10px 18px rgba(199, 145, 87, 0.15);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
    }

    .photo-card {
      position: relative;
      padding: 14px;
      border: 0;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.5));
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
      text-align: left;
      color: inherit;
      overflow: hidden;
    }

    .photo-card:hover,
    .photo-card:focus-visible {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 48px rgba(204, 128, 58, 0.18);
      outline: none;
    }

    .photo-card::before {
      content: "";
      position: absolute;
      inset: auto -30px -34px auto;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 143, 177, 0.16), transparent 70%);
      pointer-events: none;
    }

    .photo-frame {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3), var(--accent4));
      margin-bottom: 12px;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 17px;
      background: rgba(255,255,255,0.7);
    }

    .photo-name {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      color: #6a4020;
    }

    .photo-role {
      margin-top: 4px;
      font-size: 13px;
      color: #9b6b49;
    }

    .photo-cta {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid rgba(255, 169, 99, 0.24);
      color: #b1642f;
      font-size: 12px;
      font-weight: 700;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(121, 79, 47, 0.28);
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .modal.active { display: flex; }

    .modal-panel {
      position: relative;
      width: min(980px, 100%);
      max-height: min(88vh, 920px);
      overflow: auto;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,248,241,0.9));
      border: 1px solid rgba(255, 177, 110, 0.34);
      box-shadow: var(--modal-shadow);
      padding: 26px;
    }

    .modal-close {
      position: sticky;
      top: 0;
      margin-left: auto;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.86);
      color: #aa6434;
      box-shadow: 0 10px 20px rgba(196, 132, 73, 0.12);
      font-size: 24px;
      cursor: pointer;
      z-index: 2;
    }

    .modal-body {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 26px;
      align-items: start;
    }

    .modal-photo-wrap {
      position: sticky;
      top: 56px;
    }

    .modal-photo-frame {
      padding: 4px;
      border-radius: 26px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3), var(--accent4));
      box-shadow: 0 20px 36px rgba(212, 143, 78, 0.18);
    }

    .modal-photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      border-radius: 22px;
      background: rgba(255,255,255,0.8);
    }

    .modal-name {
      margin: 14px 0 4px;
      font-size: 30px;
      line-height: 1.25;
      color: #734423;
    }

    .modal-role {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: #8d5328;
      background: rgba(255, 192, 136, 0.28);
      border: 1px solid rgba(255, 179, 122, 0.42);
    }

    .modal-copy {
      display: grid;
      gap: 14px;
    }

    .profile-box {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(255, 180, 116, 0.22);
      border-radius: 20px;
      padding: 16px 16px 15px;
      box-shadow: 0 10px 18px rgba(211, 145, 85, 0.08);
    }

    .profile-box h3 {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c46d2b;
    }

    .profile-box p {
      margin: 0;
      font-size: 14px;
      color: #6d4a2f;
      white-space: pre-line;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      font-size: 12px;
      padding: 7px 11px;
      border-radius: 999px;
      color: #865135;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(255, 183, 117, 0.28);
      font-weight: 700;
    }

    footer {
      padding: 8px 0 34px;
      color: #a27453;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 1080px) {
      .photo-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .modal-body { grid-template-columns: 240px 1fr; }
    }

    @media (max-width: 760px) {
      .container { width: min(100% - 20px, 1200px); }
      header { padding-top: 24px; }
      .hero { padding: 24px 18px; border-radius: 24px; }
      .photo-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
      .modal { padding: 12px; }
      .modal-panel { padding: 16px; border-radius: 24px; }
      .modal-body { grid-template-columns: 1fr; gap: 18px; }
      .modal-photo-wrap { position: static; }
      .modal-name { font-size: 26px; }
    }

    @media (max-width: 520px) {
      .photo-grid { grid-template-columns: 1fr; }
      .photo-card { padding: 12px; }
    }
  </style>
</head>

    const photoGrid = document.getElementById('photoGrid');
    const modal = document.getElementById('profileModal');
    const modalClose = document.getElementById('modalClose');

    const modalPhoto = document.getElementById('modalPhoto');
    const modalName = document.getElementById('modalName');
    const modalRole = document.getElementById('modalRole');
    const modalBirthplace = document.getElementById('modalBirthplace');
    const modalSpecialty = document.getElementById('modalSpecialty');
    const modalHobby = document.getElementById('modalHobby');
    const modalBio = document.getElementById('modalBio');
    const modalWork = document.getElementById('modalWork');
    const modalStruggle = document.getElementById('modalStruggle');
    const modalMessage = document.getElementById('modalMessage');

    photoGrid.innerHTML = members.map((member, index) => `
      <button class="photo-card" type="button" data-index="${index}" aria-label="${member.name}のプロフィールを表示">
        <div class="photo-frame">
          <img src="${member.photo}" alt="${member.name}の顔写真" />
        </div>
        <h2 class="photo-name">${member.name}</h2>
        ${member.role ? `<div class="photo-role">${member.role}</div>` : ''}
        <div class="photo-cta">プロフィールを見る →</div>
      </button>
    `).join('');

    function openModal(member) {
      modalPhoto.src = member.photo;
      modalPhoto.alt = `${member.name}の顔写真`;
      modalName.textContent = member.name;
      modalRole.textContent = member.role || '';
      modalRole.style.display = member.role ? 'inline-block' : 'none';
      modalBirthplace.textContent = member.birthplace || 'ー';
      modalSpecialty.textContent = `特技：${member.specialty}`;
      modalHobby.textContent = `趣味：${member.hobby}`;
      modalBio.textContent = member.bio;
      modalWork.textContent = member.work;
      modalStruggle.textContent = member.struggle;
      modalMessage.textContent = member.message;
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    photoGrid.addEventListener('click', (event) => {
      const card = event.target.closest('.photo-card');
      if (!card) return;
      const member = members[Number(card.dataset.index)];
      openModal(member);
    });

    modalClose.addEventListener('click', closeModal);

    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && modal.classList.contains('active')) {
        closeModal();
      }
    });
  </script>
